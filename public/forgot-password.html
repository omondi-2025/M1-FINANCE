<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>M1 Finance | Forgot Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="auth-page">
    <form id="forgotPasswordForm">
      <h2>Forgot Password</h2>
      <div id="infoBox" style="margin-bottom:10px;color:#0d47a1;"></div>

      <div class="input-group">
        <i class="fa fa-envelope"></i>
        <input type="email" id="email" placeholder="Enter your account email" required>
      </div>

      <button type="submit">Send Reset Email</button>
      <p><a href="signin.html">Back to Sign In</a></p>
    </form>
  </div>

  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const infoBox = document.getElementById('infoBox');
      infoBox.style.color = '#0d47a1';
      infoBox.textContent = '';

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value.trim() })
        });

        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.message || data.error || 'Failed to send reset email');
        }

        infoBox.textContent = data.message;
      } catch (err) {
        infoBox.style.color = '#b91c1c';
        infoBox.textContent = err.message || 'Failed to send reset email';
      }
    });
  </script>
</body>
</html>
