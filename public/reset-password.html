<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>M1 Finance | Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="auth-page">
    <form id="resetPasswordForm">
      <h2>Reset Password</h2>
      <div id="messageBox" style="margin-bottom:10px;color:#0d47a1;"></div>

      <div class="input-group">
        <i class="fa fa-lock"></i>
        <input type="password" id="newPassword" placeholder="New password" required>
      </div>

      <div class="input-group">
        <i class="fa fa-check"></i>
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
      </div>

      <button type="submit">Reset Password</button>
      <p><a href="signin.html">Back to Sign In</a></p>
    </form>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const userId = params.get('id');
    const messageBox = document.getElementById('messageBox');

    if (!token || !userId) {
      messageBox.style.color = '#b91c1c';
      messageBox.textContent = 'Invalid reset link.';
    }

    document.getElementById('resetPasswordForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      messageBox.style.color = '#0d47a1';
      messageBox.textContent = '';

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId,
            token,
            newPassword: document.getElementById('newPassword').value,
            confirmPassword: document.getElementById('confirmPassword').value,
          })
        });

        const data = await res.json();
        if (!res.ok || !data.success) {
          throw new Error(data.message || data.error || 'Failed to reset password');
        }

        messageBox.textContent = data.message;
        setTimeout(() => {
          window.location.href = 'signin.html';
        }, 2000);
      } catch (err) {
        messageBox.style.color = '#b91c1c';
        messageBox.textContent = err.message || 'Failed to reset password';
      }
    });
  </script>
</body>
</html>
